name: Benchmark

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - 'release/**'
  pull_request:
    branches:
      - master
      - 'release/**'

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"
  JAVA_VERSION: "17"

jobs:
  benchmark:
    name: Build benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.2.12479018"

      - run: chmod +x gradlew

      - run: |
          JAR=gradle/wrapper/gradle-wrapper.jar
          if [ ! -f "$JAR" ]; then
            curl -fsSL -o /tmp/gradle-bin.zip \
              "https://services.gradle.org/distributions/gradle-8.9-bin.zip"
            unzip -q /tmp/gradle-bin.zip -d /tmp/gradle-install
            /tmp/gradle-install/gradle-8.9/bin/gradle \
              -p "$(pwd)" wrapper --gradle-version 8.9
            rm -rf /tmp/gradle-install /tmp/gradle-bin.zip
          fi

      - name: Build benchmark
        run: ./gradlew :benchmark:assembleDebug --stacktrace

      - name: Resolve apksigner path
        run: |
          APK_SIGNER=$(ls -d $ANDROID_HOME/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1)
          if [ -z "$APK_SIGNER" ]; then
            echo "::error::apksigner not found in build-tools"
            exit 1
          fi
          echo "APK_SIGNER=$APK_SIGNER" >> $GITHUB_ENV

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/keystore.jks

      - name: Sign benchmark APK (v1+v2+v3)
        run: |
          for apk in benchmark/build/outputs/apk/debug/*.apk; do
            [ -f "$apk" ] || continue
            $APK_SIGNER sign \
              --ks /tmp/keystore.jks \
              --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
              "$apk"
          done

      - name: Verify APK signature
        run: |
          for apk in benchmark/build/outputs/apk/debug/*.apk; do
            [ -f "$apk" ] || continue
            $APK_SIGNER verify --verbose "$apk" 2>&1 | \
              grep -E "Verified using v1 scheme|Verified using v2 scheme|Verified using v3 scheme"
          done

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: benchmark-aar
          path: benchmark/build/outputs/aar/*.aar
          retention-days: 14
