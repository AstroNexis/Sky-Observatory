name: Observatory Build

on:
  push:
    branches:
      - main
      - master
      - 'release/**'
    paths:
      - 'sky-observatory/**'
      - 'api/**'
      - 'engine/**'
      - 'native/**'
      - 'gradle/**'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
  pull_request:
    branches:
      - main
      - master
      - 'release/**'
    paths:
      - 'sky-observatory/**'
      - 'api/**'
      - 'engine/**'
      - 'native/**'
      - 'gradle/**'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
  workflow_dispatch:

concurrency:
  group: observatory-build-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.2.12479018"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate Gradle wrapper if missing
        run: |
          JAR=gradle/wrapper/gradle-wrapper.jar
          if [ ! -f "$JAR" ]; then
            curl -fsSL -o /tmp/gradle-bin.zip \
              "https://services.gradle.org/distributions/gradle-8.9-bin.zip"
            unzip -q /tmp/gradle-bin.zip -d /tmp/gradle-install
            /tmp/gradle-install/gradle-8.9/bin/gradle \
              -p "$(pwd)" wrapper --gradle-version 8.9
            rm -rf /tmp/gradle-install /tmp/gradle-bin.zip
          fi

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > ${{ runner.temp }}/keystore.jks
          else
            echo "::warning::KEYSTORE_BASE64 secret is not set. Release APK will be unsigned."
          fi

      - name: Build debug APK
        run: ./gradlew :sky-observatory:assembleDebug --stacktrace --no-daemon

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :sky-observatory:assembleRelease --stacktrace --no-daemon

      - name: Run unit tests
        run: ./gradlew :api:test :engine:test :native:test --stacktrace --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: apk-debug
          path: sky-observatory/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: apk-release
          path: sky-observatory/build/outputs/apk/release/*.apk
          retention-days: 30
