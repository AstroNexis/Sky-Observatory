name: Observatory Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - 'release/**'
    paths:
      - 'sky-observatory/**'
      - 'api/**'
      - 'engine/**'
      - 'native/**'
      - 'gradle/**'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
  pull_request:
    branches:
      - master
      - main
      - 'release/**'
    paths:
      - 'sky-observatory/**'
      - 'api/**'
      - 'engine/**'
      - 'native/**'
      - 'gradle/**'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'

concurrency:
  group: observatory-build-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"
  JAVA_VERSION: "17"

jobs:
  renderer-build:
    name: Build observatory
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.2.12479018"

      - run: chmod +x gradlew

      - run: |
          JAR=gradle/wrapper/gradle-wrapper.jar
          if [ ! -f "$JAR" ]; then
            curl -fsSL -o /tmp/gradle-bin.zip \
              "https://services.gradle.org/distributions/gradle-8.9-bin.zip"
            unzip -q /tmp/gradle-bin.zip -d /tmp/gradle-install
            /tmp/gradle-install/gradle-8.9/bin/gradle \
              -p "$(pwd)" wrapper --gradle-version 8.9
            rm -rf /tmp/gradle-install /tmp/gradle-bin.zip
          fi

      - name: Build SDK artifacts
        run: ./gradlew :api:assembleDebug :engine:assembleDebug :native:assembleDebug --stacktrace

      - name: Build observatory APKs
        run: ./gradlew :sky-observatory:assembleDebug :sky-observatory:assembleRelease --stacktrace

      - name: Verify APK outputs
        run: |
          ls -lh sky-observatory/build/outputs/apk/debug/*.apk 2>/dev/null || \
            (echo "::error::Debug APK not found at expected path" && exit 1)
          echo "Debug APK size: $(stat --printf='%s' sky-observatory/build/outputs/apk/debug/*.apk) bytes"
          ls -lh sky-observatory/build/outputs/apk/release/*.apk 2>/dev/null || \
            (echo "::error::Release APK not found at expected path" && exit 1)
          echo "Release APK size: $(stat --printf='%s' sky-observatory/build/outputs/apk/release/*.apk) bytes"

      - name: Resolve apksigner path
        run: |
          APK_SIGNER=$(ls -d $ANDROID_HOME/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1)
          if [ -z "$APK_SIGNER" ]; then
            echo "::error::apksigner not found in build-tools"
            exit 1
          fi
          echo "APK_SIGNER=$APK_SIGNER" >> $GITHUB_ENV

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/keystore.jks

      - name: Sign release APKs (v2+v3)
        run: |
          for apk in sky-observatory/build/outputs/apk/release/*.apk; do
            [ -f "$apk" ] || continue
            $APK_SIGNER sign \
              --v1-signing-enabled false \
              --ks /tmp/keystore.jks \
              --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
              "$apk"
          done

      - name: Verify APK signatures
        run: |
          for apk in sky-observatory/build/outputs/apk/release/*.apk; do
            [ -f "$apk" ] || continue
            $APK_SIGNER verify --verbose "$apk" 2>&1 | \
              grep -E "Verified using v2|Verified using v3"
          done

      - name: Run SDK tests
        run: ./gradlew :api:test :engine:test :native:test --stacktrace

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: observatory-apk
          path: |
            sky-observatory/build/outputs/apk/debug/*.apk
            sky-observatory/build/outputs/apk/release/*.apk
          retention-days: 14
