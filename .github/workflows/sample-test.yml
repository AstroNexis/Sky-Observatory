name: Sample Test Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - 'release/**'
    paths:
      - 'sample-test/**'
      - 'api/**'
      - 'engine/**'
      - 'native/**'
      - 'gradle/**'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
  pull_request:
    branches:
      - master
      - 'release/**'
    paths:
      - 'sample-test/**'
      - 'api/**'
      - 'engine/**'
      - 'native/**'
      - 'gradle/**'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'

concurrency:
  group: sample-test-build-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build sample-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.2.12479018"

      - run: chmod +x gradlew

      - run: |
          JAR=gradle/wrapper/gradle-wrapper.jar
          if [ ! -f "$JAR" ]; then
            curl -fsSL -o /tmp/gradle-bin.zip \
              "https://services.gradle.org/distributions/gradle-8.9-bin.zip"
            unzip -q /tmp/gradle-bin.zip -d /tmp/gradle-install
            /tmp/gradle-install/gradle-8.9/bin/gradle \
              -p "$(pwd)" wrapper --gradle-version 8.9
            rm -rf /tmp/gradle-install /tmp/gradle-bin.zip
          fi

      - name: Build SDK artifacts
        run: ./gradlew :api:assembleDebug :engine:assembleDebug :native:assembleDebug --stacktrace

      - name: Build sample-test APK
        run: ./gradlew :sample-test:assembleDebug --stacktrace

      - name: Verify APK exists
        run: |
          ls -lh sample-test/build/outputs/apk/debug/*.apk 2>/dev/null || \
            (echo "::error::APK not found at expected path" && exit 1)
          echo "APK size: $(stat --printf='%s' sample-test/build/outputs/apk/debug/*.apk) bytes"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/keystore.jks

      - name: Sign sample-test APK (v2+v3)
        run: |
          for apk in sample-test/build/outputs/apk/debug/*.apk; do
            [ -f "$apk" ] || continue
            $ANDROID_HOME/build-tools/*/apksigner sign \
              --v1-signing-enabled false \
              --ks /tmp/keystore.jks \
              --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
              "$apk"
          done

      - name: Verify APK signature
        run: |
          for apk in sample-test/build/outputs/apk/debug/*.apk; do
            [ -f "$apk" ] || continue
            $ANDROID_HOME/build-tools/*/apksigner verify --verbose "$apk" 2>&1 | \
              grep -E "Verified using v2|Verified using v3"
          done

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: sample-test-apk
          path: sample-test/build/outputs/apk/debug/*.apk
          retention-days: 7
