name: Instrumented Tests

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - 'release/**'
  pull_request:
    branches:
      - master
      - 'release/**'

concurrency:
  group: instrumented-test-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"
  JAVA_VERSION: "17"

jobs:
  instrumented-tests:
    name: Instrumented Tests (API 29)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/microsoft
          sudo apt-get remove -y '^.*-doc$' || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          df -h

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.2.12479018"

      - run: chmod +x gradlew

      - run: |
          JAR=gradle/wrapper/gradle-wrapper.jar
          if [ ! -f "$JAR" ]; then
            curl -fsSL -o /tmp/gradle-bin.zip \
              "https://services.gradle.org/distributions/gradle-8.9-bin.zip"
            unzip -q /tmp/gradle-bin.zip -d /tmp/gradle-install
            /tmp/gradle-install/gradle-8.9/bin/gradle \
              -p "$(pwd)" wrapper --gradle-version 8.9
            rm -rf /tmp/gradle-install /tmp/gradle-bin.zip
          fi

      - run: ./gradlew assembleDebug assembleDebugAndroidTest --stacktrace

      - name: Resolve apksigner path
        run: |
          APK_SIGNER=$(ls -d $ANDROID_HOME/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1)
          if [ -z "$APK_SIGNER" ]; then
            echo "::error::apksigner not found in build-tools"
            exit 1
          fi
          echo "APK_SIGNER=$APK_SIGNER" >> $GITHUB_ENV

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/keystore.jks

      - name: Sign debug APKs (v1+v2+v3)
        run: |
          find . -path '*/build/outputs/apk/*/debug/*.apk' | while IFS= read -r apk; do
            [ -f "$apk" ] || continue
            $APK_SIGNER sign \
              --ks /tmp/keystore.jks \
              --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
              "$apk"
          done

      - name: Verify APK signatures
        run: |
          find . -path '*/build/outputs/apk/*/debug/*.apk' | while IFS= read -r apk; do
            [ -f "$apk" ] || continue
            $APK_SIGNER verify --verbose "$apk" 2>&1 | \
              grep -E "Verified using v1 scheme|Verified using v2 scheme|Verified using v3 scheme"
          done

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          emulator-options: -no-window -no-audio -no-boot-anim -memory 2048 -no-snapshot-load
          script: ./gradlew connectedDebugAndroidTest --stacktrace
          disable-animations: true
          force-avd-creation: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: instrumented-test-results
          path: |
            **/build/reports/androidTests/
          retention-days: 14
